<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>加班统计 - 设置</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      color: #333;
    }
    h1 { font-size: 20px; margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 4px; }
    textarea {
      width: 100%;
      height: 150px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
      resize: vertical;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
    button {
      margin-top: 16px;
      padding: 8px 20px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #1557b0; }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: green;
    }
  </style>
  <script type="module" src="./options.ts"></script>
</head>
<body>
  <h1>加班统计 - URL 配置</h1>
  <div>
    <label for="urls">启用的 URL 模式 (每行一个):</label>
    <textarea id="urls" placeholder="例如: *://ubd.supcon.com/ubd/*"></textarea>
    <p class="hint">使用 Chrome 匹配模式。内容脚本只在这些 URL 上执行。</p>
  </div>
  <button id="save">保存设置</button>
  <div id="status" class="status"></div>
</body>
</html>
